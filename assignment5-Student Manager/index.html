<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app">
        <h1>Student Manager</h1>
        <p class="subtitle">Store student marks using arrays and objects, then calculate averages.</p>

        <form id="studentForm" class="student-form">
            <label for="studentName">Student Name</label>
            <input id="studentName" type="text" placeholder="Enter student name" required>

            <label for="studentMarks">Marks (comma separated)</label>
            <input id="studentMarks" type="text" placeholder="e.g. 86, 90, 79" required>

            <button type="submit">Add Student</button>
            <p id="formMessage" class="form-message" aria-live="polite"></p>
        </form>

        <section class="summary">
            <article class="card">
                <h2>Total Students</h2>
                <p id="totalStudents">0</p>
            </article>
            <article class="card">
                <h2>Class Average</h2>
                <p id="classAverage">0.00</p>
            </article>
            <article class="card">
                <h2>Top Student</h2>
                <p id="topStudent">-</p>
            </article>
        </section>

        <section class="table-section">
            <h2>Student Records</h2>
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Marks</th>
                        <th>Average</th>
                    </tr>
                </thead>
                <tbody id="studentsTableBody">
                    <tr>
                        <td colspan="4" class="empty-state">No students added yet.</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
